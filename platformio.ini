; ESP32 Display Dashboard
; Board: ESP32-WROOM-32 + 1.14" ST7789 IPS (135x240), CH9102 USB-serial
; See README for staged build plan.

[env:esp32dev]
; Pinned for reproducibility — see docs/STACK.md for versions & rationale.
; espressif32 7.0.1 bundles Arduino-ESP32 core 2.0.17 (stable, best-documented 2.x line).
platform = espressif32@7.0.1
board = esp32dev
framework = arduino

; CH9102 enumerates as /dev/ttyACM0 on this machine
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

monitor_speed = 115200
upload_speed = 460800
monitor_filters = esp32_exception_decoder, time

; Exact-pinned libraries (no ^ or ~) so the build never drifts. See docs/STACK.md.
lib_deps =
	bodmer/TFT_eSPI@2.5.43
	bblanchon/ArduinoJson@7.4.3   ; used from Stage 4 (weather/usage JSON parsing)

; ---- TFT_eSPI config for ideaspark/TENSTAR ESP32 1.14" ST7789 (135x240) ----
; Pins are the community-known set for this board. If the screen stays black
; or looks wrong, these are the first knobs we tune (see README notes).
build_flags =
	-D USER_SETUP_LOADED=1
	-D ST7789_DRIVER=1
	-D TFT_WIDTH=135
	-D TFT_HEIGHT=240
	-D TFT_MOSI=19
	-D TFT_SCLK=18
	-D TFT_CS=5
	-D TFT_DC=16
	-D TFT_RST=23
	-D TFT_BL=4
	-D TFT_BACKLIGHT_ON=HIGH
	-D TFT_INVERSION_ON=1
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D LOAD_FONT6=1
	-D LOAD_FONT7=1
	-D LOAD_GFXFF=1
	-D SMOOTH_FONT=1
	-D SPI_FREQUENCY=40000000
